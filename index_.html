<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Llave de acceso</title>

  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#000000" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script> <!-- [web:20] -->

  <style>
    :root {
      --bg: #000000;
      --fg: #00ff5f;
      --accent: #00ff5f;
      --error: #ff5555;
      --font-main: "Fira Code", "JetBrains Mono", "Source Code Pro",
                   "Liberation Mono", monospace;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 8px;
      background-color: var(--bg);
      color: var(--fg);
      font-family: var(--font-main);
      display: flex;
      justify-content: center;
      align-items: stretch;
      min-height: 100vh;
    }

    .app {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    h1 {
      font-size: 1.2rem;
      margin: 4px 0 8px;
      text-align: center;
    }

    /* VISTAS */

    .view {
      flex: 1;
      display: none;
      flex-direction: column;
    }

    .view.active {
      display: flex;
    }

    /* FORM VIEW */

    .field-group {
      display: flex;
      flex-direction: column;
      margin-bottom: 6px;
    }

    label {
      font-size: 0.8rem;
      margin-bottom: 2px;
    }

    input[type="text"] {
      background-color: #050505;
      border: 1px solid #00aa4a;
      color: var(--fg);
      padding: 4px 6px;
      font-family: var(--font-main);
      font-size: 0.9rem;
      border-radius: 2px;
    }

    input[type="text"]:focus {
      outline: 1px solid var(--accent);
    }

    .generate-btn {
      margin-top: 4px;
      width: 100%;
      background-color: #050505;
      border: 1px solid var(--accent);
      color: var(--fg);
      padding: 6px;
      font-family: var(--font-main);
      font-size: 0.8rem;
      cursor: pointer;
      border-radius: 2px;
      text-transform: uppercase;
    }

    /* QR VIEW */

    .qr-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .qr-container {
      padding: 4px;
      background-color: #000000;
      display: inline-block;
    }

    #qrcode {
      width: 220px;
      height: 220px;
    }

    .back-btn {
      margin-top: 6px;
      font-size: 0.7rem;
      padding: 4px 8px;
      background-color: #050505;
      border: 1px solid var(--accent);
      color: var(--fg);
      border-radius: 2px;
      text-transform: uppercase;
      cursor: pointer;
    }

    .url-preview {
      font-size: 0.65rem;
      padding: 4px;
      margin-top: 4px;
      background-color: #050505;
      border: 1px solid #00aa4a;
      border-radius: 2px;
      word-break: break-all;
      width: 100%;
    }

    .buttons-row {
      display: flex;
      gap: 6px;
      margin-top: 4px;
    }

    .buttons-row button {
      flex: 1;
      background-color: #050505;
      border: 1px solid var(--accent);
      color: var(--fg);
      padding: 4px;
      font-family: var(--font-main);
      font-size: 0.7rem;
      cursor: pointer;
      border-radius: 2px;
      text-transform: uppercase;
    }

    .buttons-row button:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .status {
      font-size: 0.7rem;
      margin-top: 2px;
      min-height: 1em;
      color: var(--accent);
    }

    .status.error {
      color: var(--error);
    }

    footer {
      font-size: 0.6rem;
      opacity: 0.6;
      text-align: center;
      padding-top: 8px;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>Llave de acceso</h1>

    <!-- VISTA 1: FORMULARIO -->
    <div class="view active" id="formView">
      <div class="field-group">
        <label for="word1">Palabra 1</label>
        <input id="word1" type="text" autocomplete="off" />
      </div>

      <div class="field-group">
        <label for="word2">Palabra 2</label>
        <input id="word2" type="text" autocomplete="off" />
      </div>

      <div class="field-group">
        <label for="word3">Palabra 3</label>
        <input id="word3" type="text" autocomplete="off" />
      </div>

      <div class="field-group">
        <label for="word4">Palabra 4</label>
        <input id="word4" type="text" autocomplete="off" />
      </div>

      <button id="generateBtn" class="generate-btn">
        Generar llave de acceso
      </button>
    </div>

    <!-- VISTA 2: QR -->
    <div class="view" id="qrView">
      <div class="qr-main">
        <div class="qr-container">
          <div id="qrcode"></div>
        </div>
        <button id="backBtn" class="back-btn">← Volver</button>
      </div>

      <div class="url-preview" id="urlPreview">
        URL generada aparecerá aquí…
      </div>

      <div class="buttons-row">
        <button id="enterBtn" disabled>Ingresar</button>
        <button id="copyBtn" disabled>Copiar</button>
      </div>

      <div class="status" id="status"></div>
    </div>

    <footer>
      PWA · QR verde sobre fondo negro · estilo terminal
    </footer>
  </div>

  <script>
    // PWA service worker
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }

    const word1 = document.getElementById("word1");
    const word2 = document.getElementById("word2");
    const word3 = document.getElementById("word3");
    const word4 = document.getElementById("word4");

    const formView = document.getElementById("formView");
    const qrView   = document.getElementById("qrView");

    const generateBtn = document.getElementById("generateBtn");
    const backBtn     = document.getElementById("backBtn");
    const enterBtn    = document.getElementById("enterBtn");
    const copyBtn     = document.getElementById("copyBtn");

    const urlPreview  = document.getElementById("urlPreview");
    const statusEl    = document.getElementById("status");
    const qrContainer = document.getElementById("qrcode");

    let currentUrl = "";

    function safeSlug(s) {
      return s
        .toLowerCase()
        .replace(/\s+/g, "-")
        .replace(/[^a-z0-9\-]/g, "");
    }

    function buildUrl() {
      const w1 = word1.value.trim();
      const w2 = word2.value.trim();
      const w3 = word3.value.trim();
      const w4 = word4.value.trim();

      if (!w1 || !w2 || !w3 || !w4) return "";

      return (
        "https://" +
        safeSlug(w1) + "-" +
        safeSlug(w2) + "-" +
        safeSlug(w3) + "-" +
        safeSlug(w4) +
        ".trycloudflare.com/index.html"
      );
    }

    function renderQr(url) {
      qrContainer.innerHTML = "";
      if (!url) return;
      new QRCode(qrContainer, {
        text: url,
        width: 220,
        height: 220,
        colorDark: "#00ff5f",
        colorLight: "#000000",
        correctLevel: QRCode.CorrectLevel.H
      }); // [web:20]
    }

    function setStatus(msg, isError = false) {
      statusEl.textContent = msg || "";
      statusEl.classList.toggle("error", !!isError);
    }

    function showForm() {
      formView.classList.add("active");
      qrView.classList.remove("active");
    }

    function showQr() {
      formView.classList.remove("active");
      qrView.classList.add("active");
    }

    generateBtn.addEventListener("click", () => {
      const url = buildUrl();
      if (!url) {
        setStatus("Completa las 4 palabras para generar la llave.", true);
        enterBtn.disabled = true;
        copyBtn.disabled = true;
        urlPreview.textContent = "URL generada aparecerá aquí…";
        qrContainer.innerHTML = "";
        showForm();
        return;
      }

      currentUrl = url;
      urlPreview.textContent = url;
      renderQr(url);
      enterBtn.disabled = false;
      copyBtn.disabled = false;
      setStatus("Llave generada.");
      showQr();
    });

    backBtn.addEventListener("click", () => {
      showForm();
      // si quieres también limpiar el estado, descomenta:
      // currentUrl = "";
      // urlPreview.textContent = "URL generada aparecerá aquí…";
      // qrContainer.innerHTML = "";
      // enterBtn.disabled = true;
      // copyBtn.disabled = true;
      // setStatus("");
    });

    enterBtn.addEventListener("click", () => {
      if (!currentUrl) return;
      window.location.href = currentUrl;
    });

    copyBtn.addEventListener("click", async () => {
      if (!currentUrl) return;
      try {
        await navigator.clipboard.writeText(currentUrl);
        setStatus("URL copiada al portapapeles.");
      } catch (e) {
        setStatus("No se pudo copiar la URL.", true);
      }
    });
  </script>
</body>
</html>
