<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Llave de acceso</title>

  <!-- Manifest PWA -->
  <link rel="manifest" href="manifest.webmanifest">

  <!-- Colores de tema PWA -->
  <meta name="theme-color" content="#000000" />

  <!-- QRCode.js desde CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    :root {
      --bg: #000000;
      --fg: #00ff5f;
      --accent: #00ff5f;
      --error: #ff5555;
      --font-main: "Fira Code", "JetBrains Mono", "Source Code Pro",
                   "Liberation Mono", monospace;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 8px;
      background-color: var(--bg);
      color: var(--fg);
      font-family: var(--font-main);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      align-items: center;
      justify-content: flex-start;
    }

    .app {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    h1 {
      font-size: 1.2rem;
      margin: 4px 0 8px;
      text-align: center;
    }

    label {
      font-size: 0.8rem;
      margin-bottom: 2px;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      margin-bottom: 4px;
    }

    input[type="text"] {
      background-color: #050505;
      border: 1px solid #00aa4a;
      color: var(--fg);
      padding: 4px 6px;
      font-family: var(--font-main);
      font-size: 0.9rem;
      border-radius: 2px;
    }

    input[type="text"]:focus {
      outline: 1px solid var(--accent);
    }

    .buttons-row {
      display: flex;
      gap: 6px;
      margin-top: 4px;
    }

    button {
      flex: 1;
      background-color: #050505;
      border: 1px solid var(--accent);
      color: var(--fg);
      padding: 6px;
      font-family: var(--font-main);
      font-size: 0.85rem;
      cursor: pointer;
      border-radius: 2px;
      text-transform: uppercase;
    }

    button:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .qr-container {
      margin-top: 8px;
      display: flex;
      justify-content: center;
    }

    #qrcode {
      padding: 4px;
      background-color: #000000;
      display: inline-block;
    }

    .url-preview {
      font-size: 0.65rem;
      padding: 4px;
      margin-top: 4px;
      background-color: #050505;
      border: 1px solid #00aa4a;
      border-radius: 2px;
      word-break: break-all;
    }

    .status {
      font-size: 0.7rem;
      margin-top: 2px;
      min-height: 1em;
      color: var(--accent);
    }

    .status.error {
      color: var(--error);
    }

    footer {
      margin-top: auto;
      font-size: 0.6rem;
      opacity: 0.6;
      text-align: center;
      padding-top: 8px;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>Llave de acceso</h1>

    <div class="field-group">
      <label for="word1">Palabra 1</label>
      <input id="word1" type="text" autocomplete="off" />
    </div>

    <div class="field-group">
      <label for="word2">Palabra 2</label>
      <input id="word2" type="text" autocomplete="off" />
    </div>

    <div class="field-group">
      <label for="word3">Palabra 3</label>
      <input id="word3" type="text" autocomplete="off" />
    </div>

    <div class="field-group">
      <label for="word4">Palabra 4</label>
      <input id="word4" type="text" autocomplete="off" />
    </div>

    <button id="generateBtn">Generar llave de acceso</button>

    <div class="qr-container">
      <div id="qrcode"></div>
    </div>

    <div class="url-preview" id="urlPreview">
      URL generada aparecerá aquí…
    </div>

    <div class="buttons-row">
      <button id="enterBtn" disabled>Ingresar</button>
      <button id="copyBtn" disabled>Copiar</button>
    </div>

    <div class="status" id="status"></div>

    <footer>
      PWA · QR verde sobre fondo negro · estilo terminal
    </footer>
  </div>

  <script>
    // Registro de Service Worker para PWA
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }

    const word1 = document.getElementById("word1");
    const word2 = document.getElementById("word2");
    const word3 = document.getElementById("word3");
    const word4 = document.getElementById("word4");
    const generateBtn = document.getElementById("generateBtn");
    const enterBtn = document.getElementById("enterBtn");
    const copyBtn = document.getElementById("copyBtn");
    const urlPreview = document.getElementById("urlPreview");
    const statusEl = document.getElementById("status");
    const qrContainer = document.getElementById("qrcode");

    let currentUrl = "";

    // Función para construir la URL
    function buildUrl() {
      const w1 = word1.value.trim();
      const w2 = word2.value.trim();
      const w3 = word3.value.trim();
      const w4 = word4.value.trim();

      if (!w1 || !w2 || !w3 || !w4) {
        return "";
      }

      // Normalizamos sustituyendo espacios por guiones bajos, etc. si quieres
      const safe = (s) =>
        s
          .toLowerCase()
          .replace(/\s+/g, "-")
          .replace(/[^a-z0-9\-]/g, "");

      const part1 = safe(w1);
      const part2 = safe(w2);
      const part3 = safe(w3);
      const part4 = safe(w4);

      return (
        "https://" +
        part1 +
        "-" +
        part2 +
        "-" +
        part3 +
        "-" +
        part4 +
        ".trycloudflare.com/index.html"
      );
    }

    // Generar QR con colores personalizados (verde sobre negro)
    function renderQr(url) {
      qrContainer.innerHTML = "";
      if (!url) return;

      // Por defecto, QRCode.js usa negro sobre blanco,
      // pero se puede configurar con colorDark y colorLight. [web:20][web:11]
      new QRCode(qrContainer, {
        text: url,
        width: 180,
        height: 180,
        colorDark: "#00ff5f",
        colorLight: "#000000",
        correctLevel: QRCode.CorrectLevel.H
      });
    }

    function setStatus(msg, isError = false) {
      statusEl.textContent = msg || "";
      statusEl.classList.toggle("error", !!isError);
    }

    generateBtn.addEventListener("click", () => {
      const url = buildUrl();
      if (!url) {
        setStatus("Completa las 4 palabras para generar la llave.", true);
        enterBtn.disabled = true;
        copyBtn.disabled = true;
        urlPreview.textContent = "URL generada aparecerá aquí…";
        qrContainer.innerHTML = "";
        return;
      }

      currentUrl = url;
      urlPreview.textContent = url;
      renderQr(url);
      enterBtn.disabled = false;
      copyBtn.disabled = false;
      setStatus("Llave generada.");
    });

    enterBtn.addEventListener("click", () => {
      if (!currentUrl) return;
      window.location.href = currentUrl;
    });

    copyBtn.addEventListener("click", async () => {
      if (!currentUrl) return;
      try {
        await navigator.clipboard.writeText(currentUrl);
        setStatus("URL copiada al portapapeles.");
      } catch (err) {
        setStatus("No se pudo copiar la URL.", true);
      }
    });
  </script>
</body>
</html>
