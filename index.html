<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Acceso - Proyecto Faro</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #1a1a1a; color: white; }
        input { padding: 10px; margin: 5px; width: 80%; max-width: 200px; border-radius: 5px; border: 1px solid #444; background: #333; color: white; }
        button { padding: 15px 30px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        #qrcode { margin-top: 30px; background: white; display: inline-block; padding: 10px; border-radius: 10px; display: none; }
        .instrucciones { color: #aaa; font-size: 0.9em; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h2>🔑 LLAVE DE ACCESO AL NODO</h2>
    <p class="instrucciones">Ingrese las 4 palabras que muestra el monitor SCL01</p>
    
    <div id="inputs">
        <input type="text" id="p1" placeholder="Palabra 1">
        <input type="text" id="p2" placeholder="Palabra 2"><br>
        <input type="text" id="p3" placeholder="Palabra 3">
        <input type="text" id="p4" placeholder="Palabra 4">
    </div>

    <button onclick="generar()">GENERAR CÓDIGO QR</button>

    <div id="qrcode"></div>
    <p id="url-texto" style="margin-top:15px; color:#00fbff;"></p>

    <script>
        function generar() {
            const p1 = document.getElementById('p1').value.trim();
            const p2 = document.getElementById('p2').value.trim();
            const p3 = document.getElementById('p3').value.trim();
            const p4 = document.getElementById('p4').value.trim();
            
            if(!p1 || !p2 || !p3 || !p4) return alert("Por favor, llena las 4 palabras.");

            const urlFull = "https://" + p1 + "-" + p2 + "-" + p3 + "-" + p4 + ".trycloudflare.com/index.html";
            
            // Usamos la API de Google Charts para generar el QR al vuelo
            const qrDiv = document.getElementById('qrcode');
            qrDiv.style.display = "inline-block";
            qrDiv.innerHTML = '<img src="https://chart.googleapis.com/chart?chs=250x250&cht=qr&chl=' + encodeURIComponent(urlFull) + '&choe=UTF-8" alt="QR Code">';
            
            document.getElementById('url-texto').innerText = urlFull;
        }
    </script>
</body>
</html>
